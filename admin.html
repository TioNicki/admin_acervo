<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento Core - Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notice-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: var(--transition);
            margin-bottom: 1rem;
        }
        .notice-textarea {
            width: 100%;
            height: 100px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            resize: vertical;
            transition: var(--transition);
            margin-bottom: 1rem;
        }
        .notice-input:focus, .notice-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(142, 115, 104, 0.1);
        }
        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge.success { background: rgba(43, 147, 72, 0.1); color: var(--success); }
        .badge.danger { background: rgba(230, 57, 70, 0.1); color: var(--danger); }

        /* Estilo para travar o conteúdo do texto em uma linha curta */
        .text-truncate {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* Estilização do Menu de Ações Dropdown */
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            background-color: var(--card-bg);
            min-width: 150px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            z-index: 10;
            overflow: hidden;
        }
        .dropdown-menu button {
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--text-dark);
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .dropdown-menu button:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        .dropdown.show .dropdown-menu {
            display: block;
        }
    </style>
</head>
<body>

    <button id="hamburger-btn" class="hamburger">&#9776;</button>
    <div id="overlay" class="sidebar-overlay"></div>

    <aside id="sidebar">
        <h2>System Core</h2>
        <nav class="nav-menu">
            <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
            <button id="menu-users" class="nav-btn active">Gerenciar Usuários</button>
            <button id="menu-pending" class="nav-btn">Liberações</button>
            <button id="menu-notice" class="nav-btn">Enviar Aviso</button>
            <button id="btn-exit" class="nav-btn btn-logout">Sair do Painel</button>
        </nav>
    </aside>

    <main>
        <h1 id="main-title">Gerenciamento de Usuários</h1>
        
        <!-- ELEMENTOS DE USUÁRIOS -->
        <div id="section-mini-metrics" class="mini-metrics-grid">
            <div id="card-filter-all" class="mini-metric-card active" onclick="setSubFilter('all')">
                <p>Total Geral</p>
                <span id="mini-total">0</span>
            </div>
            <div id="card-filter-active" class="mini-metric-card" onclick="setSubFilter('active')">
                <p>Contas Ativas</p>
                <span id="mini-active">0</span>
            </div>
            <div id="card-filter-blocked" class="mini-metric-card" onclick="setSubFilter('blocked')">
                <p>Contas Bloqueadas</p>
                <span id="mini-blocked">0</span>
            </div>
        </div>

        <div id="section-search" class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Pesquisar por nome ou ID do usuário...">
        </div>

        <div id="section-table-box" class="table-container">
            <table>
                <thead id="table-head-content"></thead>
                <tbody id="table-body-content">
                    <tr><td colspan="3" style="text-align:center;">Carregando base de dados...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- SEÇÃO: GERENCIAR AVISOS -->
        <div id="section-notice" class="hidden">
            <div class="table-container" style="padding: 2rem; margin-bottom: 2rem;">
                <p id="form-notice-title" style="margin-top: 0; font-weight: 600; color: var(--text-light);">Criar Novo Comunicado Geral:</p>
                <form id="notice-form">
                    <input type="text" id="notice-title-input" class="notice-input" placeholder="Título resumido do aviso (ex: Instabilidade na Instalação)" required>
                    <textarea id="notice-text" class="notice-textarea" placeholder="Digite o conteúdo completo do comunicado aqui..." required></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="btn-submit-notice" class="action-btn btn-approve" style="padding: 12px 24px;">Publicar Aviso</button>
                        <button type="button" id="btn-cancel-edit" class="action-btn btn-block hidden" style="padding: 12px 24px;" onclick="cancelNoticeEdit()">Cancelar Edição</button>
                    </div>
                </form>
            </div>

            <h2>Histórico de Comunicados</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Título / Conteúdo</th>
                            <th>Status</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="table-notice-body">
                        <tr><td colspan="4" style="text-align:center;">Nenhum aviso enviado ainda.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-user-title">Detalhes do Usuário</h3>
                <button class="close-modal" onclick="closeDetails()">&times;</button>
            </div>
            <div id="modal-info-body"></div>
        </div>
    </div>

    <button id="theme-toggle" class="theme-btn">&#9681;</button>

    <script>
        const localData = JSON.parse(localStorage.getItem('acervo-usuario'));
        const hojeString = new Date().toLocaleDateString('pt-BR');

        if (!localData || localData.cargo !== 'admin') {
            window.location.replace('/login');
        } else if (localData.dataLogin !== hojeString) {
            localStorage.removeItem('acervo-usuario');
            window.location.replace('/login');
        }

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        });

        const apiBase = window.location.protocol === 'file:' ? 'http://localhost:4000' : window.location.origin;

        let serverData = { usuarios: [], avisos: [] };
        let activeTab = 'users'; 
        let subFilter = 'all'; 
        let searchQuery = '';
        let editingNoticeId = null;

        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');
        const detailsModal = document.getElementById('details-modal');
        const searchInput = document.getElementById('search-input');
        
        const mUsers = document.getElementById('menu-users');
        const mPending = document.getElementById('menu-pending');
        const mNotice = document.getElementById('menu-notice');

        function toggleMenu() { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); }
        function closeMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        hamburgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);

        // Fecha menus dropdown abertos ao clicar fora
        window.addEventListener('click', (e) => {
            if (!e.target.matches('.btn-dropdown-trigger')) {
                document.querySelectorAll('.dropdown.show').forEach(d => d.classList.remove('show'));
            }
        });

        function toggleDropdownMenu(id) {
            document.querySelectorAll('.dropdown').forEach(d => {
                if(d.id !== 'dd-' + id) d.classList.remove('show');
            });
            document.getElementById('dd-' + id).classList.toggle('show');
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderView();
        });

        function setSubFilter(filterName) {
            subFilter = filterName;
            document.getElementById('card-filter-all').classList.remove('active');
            document.getElementById('card-filter-active').classList.remove('active');
            document.getElementById('card-filter-blocked').classList.remove('active');
            if (filterName === 'all') document.getElementById('card-filter-all').classList.add('active');
            if (filterName === 'active') document.getElementById('card-filter-active').classList.add('active');
            if (filterName === 'blocked') document.getElementById('card-filter-blocked').classList.add('active');
            renderView();
        }

        async function loadData() {
            try {
                const response = await fetch(`${apiBase}/api/admin/dashboard`);
                if (!response.ok) throw new Error();
                const result = await response.json();
                serverData.usuarios = result.usuarios;
                
                const listUsersComum = serverData.usuarios.filter(u => u.cargo !== 'admin');
                document.getElementById('mini-total').textContent = listUsersComum.length;
                document.getElementById('mini-active').textContent = listUsersComum.filter(u => u.aprovado).length;
                document.getElementById('mini-blocked').textContent = listUsersComum.filter(u => !u.aprovado && !u.solicitado).length;

                const resAvisos = await fetch(`${apiBase}/api/admin/avisos`);
                if (resAvisos.ok) serverData.avisos = await resAvisos.json();

                if (localStorage.getItem('navegar-aba') === 'pending') {
                    localStorage.removeItem('navegar-aba');
                    navigate('pending', mPending);
                } else if (localStorage.getItem('navegar-aba') === 'notice') {
                    localStorage.removeItem('navegar-aba');
                    navigate('notice', mNotice);
                } else {
                    renderView();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderView() {
            const title = document.getElementById('main-title');
            const miniMetricsGrid = document.getElementById('section-mini-metrics');
            const searchContainer = document.getElementById('section-search');
            const tableBox = document.getElementById('section-table-box');
            const noticeBox = document.getElementById('section-notice');
            const tbody = document.getElementById('table-body-content');
            const thead = document.getElementById('table-head-content');

            if (activeTab === 'notice') {
                title.textContent = "Gerenciar Avisos";
                miniMetricsGrid.classList.add('hidden');
                searchContainer.classList.add('hidden');
                tableBox.classList.add('hidden');
                noticeBox.classList.remove('hidden');
                renderAvisosTable();
                return;
            }

            noticeBox.classList.add('hidden');
            searchContainer.classList.remove('hidden');
            tableBox.classList.remove('hidden');
            tbody.innerHTML = '';

            if (activeTab === 'users') {
                miniMetricsGrid.classList.remove('hidden');
                title.textContent = "Gerenciamento de Usuários";
                thead.innerHTML = `<tr><th>ID</th><th>Nome de Usuário</th><th style="text-align: right;">Ações</th></tr>`;
            } else {
                miniMetricsGrid.classList.add('hidden');
                title.textContent = "Liberações Pendentes";
                thead.innerHTML = `<tr><th>ID</th><th>Nome do Solicitante</th><th style="text-align: right;">Ações de Liberação</th></tr>`;
            }

            let listaFiltrada = serverData.usuarios;
            if (activeTab === 'pending') listaFiltrada = serverData.usuarios.filter(u => u.solicitado === true && !u.aprovado);
            if (activeTab === 'users') {
                listaFiltrada = listaFiltrada.filter(u => u.cargo === 'admin' || !u.solicitado || u.aprovado);
                if (subFilter === 'active') listaFiltrada = listaFiltrada.filter(u => u.aprovado);
                else if (subFilter === 'blocked') listaFiltrada = listaFiltrada.filter(u => !u.aprovado && u.cargo !== 'admin' && !u.solicitado);
            }
            if (searchQuery !== '') {
                listaFiltrada = listaFiltrada.filter(u => String(u.id).includes(searchQuery) || u.usuario.toLowerCase().includes(searchQuery));
            }

            if (listaFiltrada.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum registro encontrado.</td></tr>`;
                return;
            }

            listaFiltrada.forEach(u => {
                const tr = document.createElement('tr');
                if (activeTab === 'users') {
                    const isAdm = u.cargo === 'admin';
                    let toggleAction = isAdm ? `<small>Acesso Mestre</small>` : (u.aprovado ? `<button class="action-btn btn-block" onclick="changeStatus('${u.id}', false, false)">Bloquear</button>` : `<button class="action-btn btn-approve" onclick="changeStatus('${u.id}', true, false)">Ativar</button>`);
                    tr.innerHTML = `<td>#${u.id}</td><td><strong>${u.usuario}</strong></td><td style="text-align: right;"><div class="actions-cell" style="justify-content: flex-end;"><button class="action-btn btn-details" onclick="openDetails('${u.id}')">Detalhes</button>${toggleAction}</div></td>`;
                } else {
                    tr.innerHTML = `<td>#${u.id}</td><td><strong>${u.usuario}</strong></td><td style="text-align: right;"><div class="actions-cell" style="justify-content: flex-end;"><button class="action-btn btn-details" onclick="openDetails('${u.id}')">Detalhes</button><button class="action-btn btn-approve" onclick="changeStatus('${u.id}', true, false)">Aprovar Entrada</button></div></td>`;
                }
                tbody.appendChild(tr);
            });
        }

        function renderAvisosTable() {
            const tBody = document.getElementById('table-notice-body');
            tBody.innerHTML = '';

            if (serverData.avisos.length === 0) {
                tBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Nenhum aviso enviado ainda.</td></tr>`;
                return;
            }

            serverData.avisos.forEach(a => {
                const tr = document.createElement('tr');
                const dataFormatada = new Date(a.created_at).toLocaleDateString('pt-BR');
                const badgeStatus = a.ativo ? `<span class="badge success">Ativo</span>` : `<span class="badge danger">Inativo</span>`;
                const tituloLimpo = a.titulo ? a.titulo : "Sem Título";

                let actionToggleText = a.ativo ? "Desativar" : "Reenviar / Ativar";

                tr.innerHTML = `
                    <td>${dataFormatada}</td>
                    <td>
                        <div style="font-weight: 700; font-size: 0.95rem;">${tituloLimpo}</div>
                        <div class="text-truncate">${a.aviso}</div>
                    </td>
                    <td>${badgeStatus}</td>
                    <td style="text-align: right;">
                        <div class="dropdown" id="dd-${a.id}">
                            <button class="action-btn btn-details btn-dropdown-trigger" onclick="toggleDropdownMenu('${a.id}')">Ações ⚙️</button>
                            <div class="dropdown-menu">
                                <button onclick="startNoticeEdit('${a.id}', \`${tituloLimpo.replace(/"/g, '&quot;')}\`, \`${a.aviso.replace(/"/g, '&quot;')}\`)">✏️ Editar</button>
                                <button onclick="toggleNoticeStatus('${a.id}', ${!a.ativo})">${a.ativo ? '❌ Desativar' : '🚀 Ativar'}</button>
                                <button style="color:var(--danger);" onclick="deleteNotice('${a.id}')">🗑️ Excluir</button>
                            </div>
                        </div>
                    </td>
                `;
                tBody.appendChild(tr);
            });
        }

        document.getElementById('notice-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const titulo = document.getElementById('notice-title-input').value.trim();
            const aviso = document.getElementById('notice-text').value.trim();

            const url = editingNoticeId ? `${apiBase}/api/admin/aviso/${editingNoticeId}` : `${apiBase}/api/admin/aviso`;
            const method = editingNoticeId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, aviso })
                });

                if (response.ok) {
                    alert(editingNoticeId ? 'Aviso atualizado com sucesso!' : 'Novo aviso publicado com sucesso!');
                    cancelNoticeEdit();
                    loadData();
                } else {
                    alert('Erro ao salvar comunicado.');
                }
            } catch (err) {
                alert('Erro na comunicação.');
            }
        });

        function startNoticeEdit(id, title, text) {
            editingNoticeId = id;
            document.getElementById('notice-title-input').value = title;
            document.getElementById('notice-text').value = text;
            document.getElementById('form-notice-title').textContent = "Editar Texto do Comunicado:";
            document.getElementById('btn-submit-notice').textContent = "Salvar Alterações";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelNoticeEdit() {
            editingNoticeId = null;
            document.getElementById('notice-title-input').value = '';
            document.getElementById('notice-text').value = '';
            document.getElementById('form-notice-title').textContent = "Criar Novo Comunicado Geral:";
            document.getElementById('btn-submit-notice').textContent = "Publicar Aviso";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        async function toggleNoticeStatus(id, newStatus) {
            try {
                const res = await fetch(`${apiBase}/api/admin/aviso/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ativo: newStatus })
                });
                if (res.ok) loadData();
            } catch (err) { alert('Erro ao alterar status.'); }
        }

        async function deleteNotice(id) {
            if (!confirm('Deseja realmente excluir este comunicado de forma definitiva?')) return;
            try {
                const res = await fetch(`${apiBase}/api/admin/aviso/${id}`, { method: 'DELETE' });
                if (res.ok) loadData();
            } catch (err) { alert('Erro ao deletar aviso.'); }
        }

        function openDetails(userId) {
        const user = serverData.usuarios.find(u => String(u.id) === String(userId));
        if (!user) return;

        document.getElementById('modal-user-title').textContent = `Dados de @${user.usuario}`;

        // Define o texto do status da conta
        let situacaoText = user.aprovado 
            ? 'Aprovado / Ativo' 
            : (user.solicitado ? 'Aguardando Liberação' : 'Conta Bloqueada');

        // Formata a data de entrada do usuário no acervo
        const dataEntrada = user.created_at 
            ? new Date(user.created_at).toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            })
            : 'Não informada';

        // Preenche o modal com os dados do usuário
        document.getElementById('modal-info-body').innerHTML = `
            <div class="info-row"><span>ID:</span><span>#${user.id}</span></div>
            <div class="info-row"><span>Usuário:</span><span>${user.usuario}</span></div>
            <div class="info-row"><span>Cargo:</span><span>${user.cargo || 'comum'}</span></div>
            <div class="info-row"><span>Situação:</span><span>${situacaoText}</span></div>
            <div class="info-row"><span>Membro desde:</span><span>${dataEntrada}</span></div>
            <div class="info-row"><span>Livros este mês:</span><span>${user.livros_mes || 0}</span></div>
            <div class="info-row"><span>Total de livros:</span><span>${user.total_livros || 0}</span></div>
        `;

        detailsModal.classList.add('active');
        }
        function closeDetails() { detailsModal.classList.remove('active'); }

        async function changeStatus(userId, approvedState, requestedState) {
            try {
                const response = await fetch(`${apiBase}/api/admin/usuarios/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ aprovado: approvedState, solicitado: requestedState })
                });
                if (response.ok) loadData();
            } catch (err) { console.error(err); }
        }

        function navigate(tabName, clickedBtn) {
            activeTab = tabName;
            subFilter = 'all'; searchQuery = ''; searchInput.value = '';
            mUsers.classList.remove('active');
            mPending.classList.remove('active');
            mNotice.classList.remove('active');
            clickedBtn.classList.add('active');
            cancelNoticeEdit();
            renderView();
            closeMenu();
        }

        mUsers.addEventListener('click', () => navigate('users', mUsers));
        mPending.addEventListener('click', () => navigate('pending', mPending));
        mNotice.addEventListener('click', () => navigate('notice', mNotice));

        document.getElementById('btn-exit').addEventListener('click', () => {
            localStorage.removeItem('acervo-usuario');
            window.location.href = '/login';
        });

        loadData();
    </script>
</body>
</html>>
