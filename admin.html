<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento Core - Admin</title>
    </head>
<body>

    <button id="hamburger-btn" class="hamburger">&#9776;</button>
    <div id="overlay" class="sidebar-overlay"></div>

    <aside id="sidebar">
        <h2>System Core</h2>
        <nav class="nav-menu">
            <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
            <button id="menu-users" class="nav-btn active">Gerenciar Usuários</button>
            <button id="menu-pending" class="nav-btn">Liberações</button>
            <button id="btn-exit" class="nav-btn btn-logout">Sair do Painel</button>
        </nav>
    </aside>

    <main>
        <h1 id="main-title">Gerenciamento de Usuários</h1>
        
        <div id="section-mini-metrics" class="mini-metrics-grid">
            <div id="card-filter-all" class="mini-metric-card active" onclick="setSubFilter('all')">
                <p>Total Geral</p>
                <span id="mini-total">0</span>
            </div>
            <div id="card-filter-active" class="mini-metric-card" onclick="setSubFilter('active')">
                <p>Contas Ativas</p>
                <span id="mini-active">0</span>
            </div>
            <div id="card-filter-blocked" class="mini-metric-card" onclick="setSubFilter('blocked')">
                <p>Contas Bloqueadas</p>
                <span id="mini-blocked">0</span>
            </div>
        </div>

        <div id="section-search" class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Pesquisar por nome ou ID do usuário...">
        </div>

        <div id="section-table-box" class="table-container">
            <table>
                <thead id="table-head-content">
                    </thead>
                <tbody id="table-body-content">
                    <tr><td colspan="3" style="text-align:center;">Carregando base de dados...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-user-title">Detalhes do Usuário</h3>
                <button class="close-modal" onclick="closeDetails()">&times;</button>
            </div>
            <div id="modal-info-body">
                </div>
        </div>
    </div>

    <script>
        // Verificação de Segurança e Logoff Diário
        const localData = JSON.parse(localStorage.getItem('acervo-usuario'));
        const hojeString = new Date().toLocaleDateString('pt-BR');

        if (!localData || localData.cargo !== 'admin') {
            window.location.replace('/login');
        } else if (localData.dataLogin !== hojeString) {
            localStorage.removeItem('acervo-usuario');
            window.location.replace('/login');
        }

        const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:4000'
            : 'https://admin-acervo.onrender.com';

        let serverData = { usuarios: [] };
        let activeTab = 'users'; // Começa direto na aba operacional de gerenciamento
        let subFilter = 'all'; 
        let searchQuery = '';

        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');
        const detailsModal = document.getElementById('details-modal');
        const searchInput = document.getElementById('search-input');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderView();
        });

        function setSubFilter(filterName) {
            subFilter = filterName;
            document.getElementById('card-filter-all').classList.remove('active');
            document.getElementById('card-filter-active').classList.remove('active');
            document.getElementById('card-filter-blocked').classList.remove('active');

            if (filterName === 'all') document.getElementById('card-filter-all').classList.add('active');
            if (filterName === 'active') document.getElementById('card-filter-active').classList.add('active');
            if (filterName === 'blocked') document.getElementById('card-filter-blocked').classList.add('active');

            renderView();
        }

        async function loadData() {
            try {
                const response = await fetch(`${apiBase}/api/admin/dashboard`);
                if (!response.ok) throw new Error();
                const result = await response.json();
                serverData.usuarios = result.usuarios;
                
                const listUsersComum = serverData.usuarios.filter(u => u.cargo !== 'admin');
                const total = listUsersComum.length;
                const ativos = listUsersComum.filter(u => u.aprovado).length;
                const bloqueados = listUsersComum.filter(u => !u.aprovado && !u.solicitado).length;

                document.getElementById('mini-total').textContent = total;
                document.getElementById('mini-active').textContent = ativos;
                document.getElementById('mini-blocked').textContent = bloqueados;

                renderView();
            } catch (err) {
                console.error("Erro ao processar dados de usuários:", err);
            }
        }

        function renderView() {
            const title = document.getElementById('main-title');
            const miniMetricsGrid = document.getElementById('section-mini-metrics');
            const thead = document.getElementById('table-head-content');
            const tbody = document.getElementById('table-body-content');

            tbody.innerHTML = '';

            if (activeTab === 'users') {
                miniMetricsGrid.classList.remove('hidden');
            } else {
                miniMetricsGrid.classList.add('hidden');
            }

            let listaFiltrada = serverData.usuarios;

            if (activeTab === 'pending') {
                listaFiltrada = serverData.usuarios.filter(u => u.solicitado === true && !u.aprovado);
            }

            if (activeTab === 'users') {
                listaFiltrada = listaFiltrada.filter(u => u.cargo === 'admin' || !u.solicitado || u.aprovado);

                if (subFilter === 'active') {
                    listaFiltrada = listaFiltrada.filter(u => u.aprovado);
                } else if (subFilter === 'blocked') {
                    listaFiltrada = listaFiltrada.filter(u => !u.aprovado && u.cargo !== 'admin' && !u.solicitado);
                }
            }

            if (searchQuery !== '') {
                listaFiltrada = listaFiltrada.filter(u => 
                    String(u.id).includes(searchQuery) || 
                    u.usuario.toLowerCase().includes(searchQuery)
                );
            }

            if (activeTab === 'users') {
                title.textContent = "Gerenciamento de Usuários";
                thead.innerHTML = `
                    <tr>
                        <th>ID</th>
                        <th>Nome de Usuário</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                `;
                
                if (listaFiltrada.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum usuário correspondente nesta categoria.</td></tr>`;
                    return;
                }

                listaFiltrada.forEach(u => {
                    const tr = document.createElement('tr');
                    const isAdm = u.cargo === 'admin';
                    
                    let toggleAction = isAdm 
                        ? `<small>Acesso Mestre</small>` 
                        : (u.aprovado 
                            ? `<button class="action-btn btn-block" onclick="changeStatus('${u.id}', false, false)">Bloquear</button>` 
                            : `<button class="action-btn btn-approve" onclick="changeStatus('${u.id}', true, false)">Ativar</button>`);
                    
                    tr.innerHTML = `
                        <td>#${u.id}</td>
                        <td><strong>${u.usuario}</strong></td>
                        <td style="text-align: right;">
                            <div class="actions-cell" style="justify-content: flex-end;">
                                <button class="action-btn btn-details" onclick="openDetails('${u.id}')">Detalhes</button>
                                ${toggleAction}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } 
            
            else if (activeTab === 'pending') {
                title.textContent = "Liberações Pendentes";
                thead.innerHTML = `
                    <tr>
                        <th>ID</th>
                        <th>Nome do Solicitante</th>
                        <th style="text-align: right;">Ações de Liberação</th>
                    </tr>
                `;
                
                if (listaFiltrada.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhuma nova solicitação de entrada.</td></tr>`;
                    return;
                }

                listaFiltrada.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${u.id}</td>
                        <td><strong>${u.usuario}</strong></td>
                        <td style="text-align: right;">
                            <div class="actions-cell" style="justify-content: flex-end;">
                                <button class="action-btn btn-details" onclick="openDetails('${u.id}')">Detalhes</button>
                                <button class="action-btn btn-approve" onclick="changeStatus('${u.id}', true, false)">Aprovar Entrada</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function openDetails(userId) {
            const user = serverData.usuarios.find(u => String(u.id) === String(userId));
            if (!user) return;

            document.getElementById('modal-user-title').textContent = `Dados de @${user.usuario}`;
            const dataCadastro = user.created_at ? new Date(user.created_at).toLocaleDateString('pt-BR') : "Não informada";
            let situacaoText = user.aprovado ? 'Aprovado / Ativo' : (user.solicitado ? 'Aguardando Liberação' : 'Conta Bloqueada');

            const body = document.getElementById('modal-info-body');
            body.innerHTML = `
                <div class="info-row"><span>ID da Conta:</span><span>#${user.id}</span></div>
                <div class="info-row"><span>Nome de Usuário:</span><span>${user.usuario}</span></div>
                <div class="info-row"><span>Cargo atribuído:</span><span>${user.cargo === 'admin' ? 'Administrador' : 'Membro'}</span></div>
                <div class="info-row"><span>Situação do Cadastro:</span><span>${situacaoText}</span></div>
                <div class="info-row"><span>Data de Cadastro:</span><span>${dataCadastro}</span></div>
                <div class="info-row"><span>Total de Livros no Acervo:</span><span>${user.total_livros || 0} livros</span></div>
                <div class="info-row"><span>Livros Adicionados no Mês:</span><span>${user.livros_mes || 0} livros</span></div>
            `;
            detailsModal.classList.add('active');
        }

        function closeDetails() { detailsModal.classList.remove('active'); }
        window.onclick = function(e) { if (e.target === detailsModal) closeDetails(); }

        async function changeStatus(userId, approvedState, requestedState) {
            try {
                const response = await fetch(`${apiBase}/api/admin/usuarios/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ aprovado: approvedState, solicitado: requestedState })
                });
                if (response.ok) loadData();
            } catch (err) {
                alert('Erro na comunicação com o servidor.');
            }
        }

        const mUsers = document.getElementById('menu-users');
        const mPending = document.getElementById('menu-pending');

        function navigate(tabName, clickedBtn) {
            activeTab = tabName;
            subFilter = 'all'; 
            searchQuery = ''; 
            searchInput.value = '';
            mUsers.classList.remove('active');
            mPending.classList.remove('active');
            clickedBtn.classList.add('active');
            
            document.getElementById('card-filter-all').classList.add('active');
            document.getElementById('card-filter-active').classList.remove('active');
            document.getElementById('card-filter-blocked').classList.remove('active');

            renderView();
            closeMenu();
        }

        mUsers.addEventListener('click', () => navigate('users', mUsers));
        mPending.addEventListener('click', () => navigate('pending', mPending));

        document.getElementById('btn-exit').addEventListener('click', () => {
            localStorage.removeItem('acervo-usuario');
            window.location.href = '/login';
        });

        loadData();
    </script>
</body>
</html>
