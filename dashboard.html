<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão Geral - Sistema Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="hamburger-btn" class="hamburger">&#9776;</button>
    <div id="overlay" class="sidebar-overlay"></div>

    <aside id="sidebar">
        <h2>System Core</h2>
        <nav class="nav-menu">
            <button class="nav-btn active" onclick="location.href='dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='admin.html'">Gerenciar Usuários</button>
            <button class="nav-btn" onclick="localStorage.setItem('navegar-aba', 'pending'); location.href='admin.html';">Liberações</button>
            <button id="btn-exit" class="nav-btn btn-logout">Sair do Painel</button>
        </nav>
    </aside>

    <main>
        <h1>Visão Geral do Sistema</h1>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <p>Livros (Mês)</p>
                <span id="m-books-month">...</span>
            </div>
            <div class="metric-card">
                <p>Total Livros</p>
                <span id="m-books-total">...</span>
            </div>
            <div class="metric-card">
                <p>Usuários (Mês)</p>
                <span id="m-users-month">...</span>
            </div>
            <div class="metric-card">
                <p>Total Usuários</p>
                <span id="m-users-total">...</span>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-btn">&#9681;</button>

    <script>
        const localData = JSON.parse(localStorage.getItem('acervo-usuario'));
        const hojeString = new Date().toLocaleDateString('pt-BR');

        if (!localData || localData.cargo !== 'admin') {
            window.location.replace('/login');
        } else if (localData.dataLogin !== hojeString) {
            localStorage.removeItem('acervo-usuario');
            window.location.replace('/login');
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        });

        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        hamburgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);

        const apiBase = window.location.protocol === 'file:'
            ? 'http://localhost:4000'
            : window.location.origin;

        async function loadMetrics() {
            try {
                const response = await fetch(`${apiBase}/api/admin/dashboard`);
                if (!response.ok) throw new Error();
                const serverData = await response.json();
                
                document.getElementById('m-books-month').textContent = serverData.metrics.livrosMes;
                document.getElementById('m-books-total').textContent = serverData.metrics.totalLivros;
                document.getElementById('m-users-month').textContent = serverData.metrics.usuariosMes;
                document.getElementById('m-users-total').textContent = serverData.metrics.totalUsuarios;
            } catch (err) {
                console.error("Erro ao buscar métricas:", err);
            }
        }

        document.getElementById('btn-exit').addEventListener('click', () => {
            localStorage.removeItem('acervo-usuario');
            window.location.href = '/login';
        });

        loadMetrics();
    </script>
</body>
</html>
